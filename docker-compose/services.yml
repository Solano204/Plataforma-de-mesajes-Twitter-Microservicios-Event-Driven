services:
  keycloak-authorization-server:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-latest}
    hostname: keycloak-server
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Auto-imports the microservices-realm (roles, elastic-query-web-client
      # client + real secret, audience mappers) on every fresh start - the
      # realm used to only exist in whichever Postgres Keycloak happened to
      # be pointed at (previously the host's native install), so a clean
      # `docker compose up` on a fresh machine had no realm at all. Exported
      # via the admin partial-export API from the last working instance
      # 2026-07-23; secrets Keycloak masks in export were patched back in by
      # hand afterward (only elastic-query-web-client's secret is actually
      # consumed by any service's Spring config - see that service below).
      - "./keycloak-realm-export.json:/tmp/microservices-realm.json:ro"
    environment:
      - "KEYCLOAK_USER=admin"
      - "KEYCLOAK_PASSWORD=admin"
      - "JAVA_OPTS=-Djboss.http.port=9091"
      - "DB_VENDOR=POSTGRES"
      - "DB_ADDR=postgres"
      - "DB_DATABASE=keycloak"
      - "DB_USER=keycloak"
      - "DB_SCHEMA=keycloak"
      - "DB_PASSWORD=keycloak"
      # Legacy (pre-Quarkus) Keycloak Docker image's supported auto-import
      # mechanism - imports on every boot, OVERWRITE_EXISTING per Keycloak's
      # own default import strategy for this env var, so it stays converged
      # even if the realm already exists in the (now containerized) DB.
      - "KEYCLOAK_IMPORT=/tmp/microservices-realm.json"
    # No restart policy existed anywhere in this file (Docker's default is
    # "no" - a container that exits stays exited forever). Every one of
    # today's transient startup races (DB not ready, ES cluster still
    # forming, etc.) would self-heal on a simple retry a minute later;
    # without this, a single bad-timing failure kills the service
    # permanently instead. Capped at 5 so a *genuinely* broken config still
    # surfaces as a real failure instead of crash-looping forever.
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  twitter-to-kafka-service:
    image: ${GROUP_ID}/twitter.to.kafka.service:${SERVICE_VERSION:-latest}
    ports:
      - "5005:5005"
    volumes:
      - "./docker-logs:/workspace/twitter-to-kafka-service/logs"
      - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
      - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
      - config-server
      - kafka
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=info"
      - "LOGGING_LEVEL_ROOT=info"
      - "KAFKA-CONFIG_TOPIC-NAME=twitter-topic"
      - "KAFKA-CONFIG_TOPIC-NAMES-TO-CREATE_0=twitter-topic"
      - "KAFKA-CONFIG_TOPIC-NAMES-TO-CREATE_1=twitter-analytics-topic"
      - "KAFKA-CONFIG_BOOTSTRAP-SERVERS=kafka:9092"
      - "KAFKA-CONFIG_SCHEMA-REGISTRY-URL=http://schema-registry:8081"
      - "TWITTER-TO-KAFKA-SERVICE_ENABLE-MOCK-TWEETS=true"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "LOG_APP-NAME=twitter-to-kafka-service"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
      - "SPRING_ZIPKIN_SENDER_TYPE=web"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  kafka-to-elastic-service:
    image: ${GROUP_ID}/kafka.to.elastic.service:${SERVICE_VERSION:-latest}
    ports:
      - "5006:5006"
    volumes:
      - "./docker-logs:/workspace/kafka-to-elastic-service/logs"
      - "./check-kafka-topics-created.sh:/usr/local/bin/check-kafka-topics-created.sh"
    user: root
    entrypoint: ["check-kafka-topics-created.sh"]
    depends_on:
      config-server:
        condition: service_started
      twitter-to-kafka-service:
        condition: service_started
      kafka:
        condition: service_healthy
      # Not condition: service_healthy - Compose's dependency-wait can abort
      # the ENTIRE `up` if a healthcheck flaps even briefly (observed: a
      # 3-node ES cluster forming under host contention became healthy
      # ~40s in, comfortably inside the 60s start_period, but `docker
      # compose up` still errored "elastic-1 is unhealthy" and gave up on
      # the whole stack). A hard gate here is a worse failure mode than the
      # thing it was meant to prevent. The real fix is the app's own
      # connect/socket timeouts below - elastic-1 still keeps its
      # healthcheck for visibility (`docker compose ps`), just not as a
      # hard dependency gate.
      elastic-1:
        condition: service_started
      elastic-2:
        condition: service_started
      elastic-3:
        condition: service_started
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=error"
      - "LOGGING_LEVEL_ROOT=error"
      - "KAFKA-CONFIG_TOPIC-NAME=twitter-topic"
      - "KAFKA-CONFIG_BOOTSTRAP-SERVERS=kafka:9092"
      - "KAFKA-CONFIG_SCHEMA-REGISTRY-URL=http://schema-registry:8081"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "ELASTIC-CONFIG_INDEX-NAME=twitter-index"
      - "ELASTIC-CONFIG_CONNECTION-URL=elastic-1:9200"
      - "LOG_APP-NAME=kafka-to-elastic-service"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "SPRING_ZIPKIN_SENDER_TYPE=kafka"
      - "SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "SPRING_DATA_ELASTICSEARCH_CLIENT_REACTIVE_ENDPOINTS=elastic-1:9200"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  config-server:
    image: ${GROUP_ID}/config.server:${SERVICE_VERSION:-latest}
    ports:
      - "5007:5007"
      # Host 8890, not 8888 - GYM_MOSTER's dev compose binds 8888. Container
      # still listens on 8888 internally (SERVER_PORT below unchanged).
      - "8890:8888"
    volumes:
      - "./docker-logs:/workspace/config-server/logs"
      # config-server's native.search-locations (application.yml) is
      # "file:./config-server-repository,file:../config-server-repository",
      # resolved relative to its own working directory - the Buildpack
      # runtime image's CWD is /workspace (confirmed via its startup log:
      # "started by cnb in /workspace"). The repo directory is never
      # packaged into the image, so without this mount every other
      # service's per-service config (kafka-streams-service's
      # application-id/state-file-location, etc.) silently comes back
      # empty from config-server - it doesn't error, it just serves
      # nothing, which surfaced as NPEs/SpEL failures downstream instead
      # of an obvious config-server-side error.
      - "../config-server-repository:/workspace/config-server-repository:ro"
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007 -Xms128m -Xmx256m"
      - "LOG_APP-NAME=config-server"
      - "SERVER_PORT=8888"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  elastic-query-service:
    image: ${GROUP_ID}/elastic.query.service:${SERVICE_VERSION:-latest}
    ports:
      - "5008:5008"
      # Host 8189, not 8183 - FOOD-ORDERIN's restaurant-service is currently
      # bound there. Container still listens on 8183 internally.
      - "8189:8183"
    volumes:
      - "./docker-logs:/workspace/elastic-query-service/logs"
      - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
      - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
      config-server:
        condition: service_started
      # See kafka-to-elastic-service above for why this isn't
      # condition: service_healthy.
      elastic-1:
        condition: service_started
      elastic-2:
        condition: service_started
      elastic-3:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5008 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=info"
      - "LOGGING_LEVEL_ROOT=info"
      - "ELASTIC-CONFIG_INDEX-NAME=twitter-index"
      - "ELASTIC-CONFIG_CONNECTION-URL=elastic-1:9200"
      - "SERVER_PORT=8183"
      - "SERVER_SERVLET_CONTEXT-PATH=/"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm"
      - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm/protocol/openid-connect/certs"
      - "SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm/protocol/openid-connect/token"
      # postgres:5432, not host.docker.internal - fully containerized now,
      # doesn't depend on anything running on the host machine. Credentials
      # match postgres.yml's POSTGRES_USER/PASSWORD (postgres/postgres);
      # postgres-init/001-init.sql creates the "keycloak" database and
      # "analytics" schema this stack needs, "public" (used here) is
      # postgres's own default schema, no init needed.
      - "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=public&binaryTransfer=true&reWriteBatchedInserts=true"
      - "SPRING_DATASOURCE_USERNAME=postgres"
      - "SPRING_DATASOURCE_PASSWORD=postgres"
      - "ELASTIC-QUERY-SERVICE_QUERY-FROM-KAFKA-STATE-STORE_URI=http://gateway-service:9092/kafka-streams-service/get-word-count-by-word/{word}"
      - "ELASTIC-QUERY-SERVICE_QUERY-FROM-ANALYTICS-DATABASE_URI=http://gateway-service:9092/analytics-service/get-word-count-by-word/{word}"
      - "ELASTIC-QUERY-SERVICE_WEBCLIENT_QUERY-TYPE=ANALYTICS_DATABASE"
      - "LOG_APP-NAME=elastic-query-service"
      - "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "SPRING_ZIPKIN_SENDER_TYPE=kafka"
      - "SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "SPRING_DATA_ELASTICSEARCH_CLIENT_REACTIVE_ENDPOINTS=elastic-1:9200"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  elastic-query-web-client:
    image: ${GROUP_ID}/elastic.query.web.client:${SERVICE_VERSION:-latest}
    ports:
      - "5010:5010"
      # Host 8190, not 8184 - FOOD-ORDERIN's customer-service is currently
      # bound there. Container still listens on 8184 internally.
      - "8190:8184"
    volumes:
      - "./docker-logs:/workspace/elastic-query-web-client/logs"
      - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
      - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
      - config-server
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5010 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=info"
      - "LOGGING_LEVEL_ROOT=info"
      - "SERVER_PORT=8184"
      - "SERVER_SERVLET_CONTEXT-PATH=/elastic-query-web-client"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "ELASTIC-QUERY-WEB-CLIENT_WEB-CLIENT_BASE-URL=http://gateway-service:9092/elastic-query-service/documents"
      - "ELASTIC-QUERY-WEB-CLIENT_WEB-CLIENT_INSTANCES_0_ID=elastic-query-service"
      - "ELASTIC-QUERY-WEB-CLIENT_WEB-CLIENT_INSTANCES_0_HOST=elastic-query-service"
      - "ELASTIC-QUERY-WEB-CLIENT_WEB-CLIENT_INSTANCES_0_PORT=8183"
      - "SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm"
      # The provider (above) was already configured, but no registration ever
      # was - WebClientConfig.webClientBuilder() needs a ClientRegistrationRepository
      # bean, which Spring only auto-configures once a registration exists.
      # client-id/secret match the "elastic-query-web-client" client
      # imported into Keycloak (see keycloak-authorization-server's
      # KEYCLOAK_IMPORT above) - registration id "keycloak" matches
      # SECURITY_DEFAULT-CLIENT-REGISTRATION-ID below.
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT-ID=elastic-query-web-client"
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT-SECRET=851a125f-7914-47da-bbeb-ec528c1755a6"
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_AUTHORIZATION-GRANT-TYPE=authorization_code"
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_SCOPE=openid"
      - "SECURITY_LOGOUT-SUCCESS-URL=http://elastic-query-web-client:8184/elastic-query-web-client"
      - "SECURITY_DEFAULT-CLIENT-REGISTRATION-ID=keycloak"
      - "LOG_APP-NAME=elastic-query-web-client"
      - "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "SPRING_ZIPKIN_SENDER_TYPE=kafka"
      - "SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  kafka-streams-service:
    image: ${GROUP_ID}/kafka.streams.service:${SERVICE_VERSION:-latest}
    ports:
    - "5012:5012"
    - "8187:8187"
    volumes:
    - "./docker-logs:/workspace/kafka-streams-service/logs"
    - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
    - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
    - config-server
    - kafka
    - zipkin
    environment:
    # Java and JVM settings
    - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5012 -Xms128m -Xmx256m"

    # Spring Profile
    - "SPRING_PROFILES_ACTIVE=docker"

    # Logging configuration
    - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=${LOGGING_LEVEL_COM_MICROSERVICES_DEMO:-error}"
    - "LOGGING_LEVEL_ROOT=${LOGGING_LEVEL_ROOT:-error}"
    - "LOGGING_LEVEL_KAFKA=${LOGGING_LEVEL_KAFKA:-INFO}"
    - "LOGGING_LEVEL_TRACING=${LOGGING_LEVEL_TRACING:-INFO}"
    - "LOGGING_LEVEL_ZIPKIN=${LOGGING_LEVEL_ZIPKIN:-INFO}"
    - "LOGGING_LEVEL_BRAVE=${LOGGING_LEVEL_BRAVE:-INFO}"

    # Server configuration
    - "SERVER_PORT=8187"
    - "SERVER_SERVLET_CONTEXT_PATH=/"

    # Spring Cloud Config
    - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"

    # OAuth2 Security
    - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm"
    - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm/protocol/openid-connect/certs"

    # Kafka Configuration
    - "KAFKA_CONFIG_BOOTSTRAP_SERVERS=kafka:9092"
    - "KAFKA_CONFIG_SCHEMA_REGISTRY_URL=http://schema-registry:8081"
    - "SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092"

    # Kafka Streams Configuration
    - "KAFKA_STREAMS_STATE_FILE_LOCATION=/tmp/kafka-streaming-state"

    # Eureka Discovery
    - "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/"

    # Zipkin and Tracing Configuration
    - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans"
    - "MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0"

    # Application name and encryption
    - "LOG_APP_NAME=kafka-streams-service"
    - "ENCRYPT_KEY=${ENCRYPT_KEY}"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  analytics-service:
    image: ${GROUP_ID}/analytics.service:${SERVICE_VERSION:-latest}
    ports:
      - "5013:5013"
      - "8188:8188"
    volumes:
      - "./docker-logs:/workspace/analytics-service/logs"
      - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
      - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
      config-server:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5013 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=info"
      - "LOGGING_LEVEL_ROOT=info"
      - "SERVER_PORT=8188"
      - "SERVER_SERVLET_CONTEXT-PATH=/"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm"
      - "SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI=http://keycloak-authorization-server:9091/auth/realms/microservices-realm/protocol/openid-connect/certs"
      # postgres:5432, not host.docker.internal - see elastic-query-service
      # above for why.
      - "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres?currentSchema=analytics&binaryTransfer=true&reWriteBatchedInserts=true"
      - "SPRING_DATASOURCE_USERNAME=postgres"
      - "SPRING_DATASOURCE_PASSWORD=postgres"
      - "KAFKA-CONFIG_BOOTSTRAP-SERVERS=kafka:9092"
      - "KAFKA-CONFIG_SCHEMA-REGISTRY-URL=http://schema-registry:8081"
      - "LOG_APP-NAME=analytics-service"
      - "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "SPRING_ZIPKIN_SENDER_TYPE=kafka"
      - "SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  discovery-service:
    image: ${GROUP_ID}/discovery.service:${SERVICE_VERSION:-latest}
    ports:
      - "5014:5014"
      # Host 8762, not 8761 - GYM_MOSTER's Eureka is currently bound there.
      # Container still listens on 8761 internally (other services reach it
      # via the internal "discovery-service:8761" hostname, unaffected).
      - "8762:8761"
    volumes:
      - "./docker-logs:/workspace/discovery-service/logs"
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5014 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_ROOT=info"
      - "SERVER_PORT=8761"
      - "EUREKA_INSTANCE_HOSTNAME=discovery-service"
      - "LOG_APP-NAME=discovery-service"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
  gateway-service:
    image: ${GROUP_ID}/gateway.service:${SERVICE_VERSION:-latest}
    ports:
      - "5016:5016"
      - "9092:9092"
    volumes:
      - "./docker-logs:/workspace/gateway-service/logs"
      - "./check-config-server-started.sh:/usr/local/bin/check-config-server-started.sh"
      - "./check-keycloak-server-started.sh:/usr/local/bin/check-keycloak-server-started.sh"
    user: root
    entrypoint: ["check-config-server-started.sh"]
    depends_on:
      - kafka
    links:
      - "redis-master:redis"
    environment:
      - "JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5016 -Xms128m -Xmx256m"
      - "LOGGING_LEVEL_COM_MICROSERVICES_DEMO=debug"
      - "LOGGING_LEVEL_ROOT=debug"
      - "SERVER_PORT=9092"
      - "SPRING_CLOUD_CONFIG_URI=http://config-server:8888"
      - "SPRING_REDIS_HOST=redis"
      - "LOG_APP-NAME=gateway-service"
      - "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/"
      - "ENCRYPT_KEY=${ENCRYPT_KEY}"
      - "SPRING_ZIPKIN_SENDER_TYPE=kafka"
      - "SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092"
      - "SPRING_SLEUTH_SAMPLER_PROBABILITY=1.0"
      - "MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411"
    restart: on-failure:5
    networks:
      - ${GLOBAL_NETWORK:-services}
