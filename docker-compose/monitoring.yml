
services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      # Host 3011, not 3000 - FURNITURE_STORE and SISTEMA PARTIDOS both bind
      # 3000 for their own frontends.
      - "3011:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - ${GLOBAL_NETWORK:-services}

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      # Host 9095, not 9090 - FOOD-ORDERIN's own Prometheus is currently
      # bound there.
      - "9095:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ${GLOBAL_NETWORK:-services}

volumes:
  grafana-storage:
  prometheus-data:
