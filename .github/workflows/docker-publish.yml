name: Build and Publish Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false # never cancel a partway-through image publish

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - analytics-service
          - config-server
          - discovery-service
          - elastic-query-service
          - elastic-query-web-client
          - elastic-query-web-client-2
          - gateway-service
          - kafka-streams-service
          - kafka-to-elastic-service
          - reactive-elastic-query-service
          - reactive-elastic-query-web-client
          - twitter-to-kafka-service
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        # ghcr.io requires an all-lowercase repository name, but
        # github.repository_owner preserves the account's actual case
        # (Solano204) - used directly, every tag/push below would fail with
        # "repository name must be lowercase" (confirmed on NEOBANK's
        # identical workflow pattern).
        run: echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      # Uses each module's spring-boot-maven-plugin build-image goal (Cloud Native
      # Buildpacks) - same tool used for local image builds, no separate Dockerfile
      # to keep in sync. Each module's pom leaves <image><name> unset so this -D
      # override actually takes effect (an explicit <name> in the pom would win
      # over it, building under a name this workflow never looks for).
      - name: Build image with Spring Boot Buildpacks
        run: >
          mvn -B -ntp -pl ${{ matrix.service }} -am spring-boot:build-image -DskipTests
          -Dspring-boot.build-image.imageName=${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Tag :latest and push
        run: |
          docker tag "${{ steps.image.outputs.name }}:${{ github.sha }}" "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"
          docker push "${{ steps.image.outputs.name }}:latest"
