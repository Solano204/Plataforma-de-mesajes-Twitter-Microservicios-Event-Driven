name: CI

on:
  push:
    branches: [ main ]
    # Coarse guard, not per-module selective (this is a single multi-module
    # Maven reactor build with no -pl targeting - a real per-module build
    # matrix would need change detection like dorny/paths-filter mapped to
    # each of the ~30 modules, which is a bigger structural change than this
    # hardening pass makes). This at least stops a pure README/doc edit from
    # triggering a full reactor build.
    paths:
      - '**/src/**'
      - '**/pom.xml'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/src/**'
      - '**/pom.xml'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Compiles and runs unit tests for every module. Deliberately mvn package,
      # not install/verify - integration tests (**/*IT.java, failsafe) need the
      # live stack (Kafka/Elasticsearch/Postgres/Keycloak/config-server) and run
      # in the separate integration-test workflow instead.
      - name: Build and run unit tests
        run: mvn -B -ntp clean package

      - name: Publish surefire test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
