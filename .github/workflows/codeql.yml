name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Catches newly-disclosed vulnerability patterns even in weeks with no commits.
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # CodeQL needs Java actually compiled to analyze it (the reactor's own
      # module boundaries); the one small vanilla-TS frontend panel
      # (elastic-query-service/frontend) is scanned source-only (build-mode:
      # none), no build step needed for it.
      - name: Build Java modules
        if: matrix.language == 'java-kotlin'
        run: mvn -B -ntp -DskipTests clean compile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169 # v3.28.0
        with:
          category: /language:${{ matrix.language }}
